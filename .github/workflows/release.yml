name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    # Secrets can't be referenced directly in `if:`, so fold the "are the Apple
    # Developer secrets configured?" check into a job-level env var that every
    # step gates on. When they're absent (no Apple Developer account yet) the
    # workflow takes the ad-hoc/unsigned path and still ships a working DMG;
    # once the secrets exist it automatically produces a notarized, stapled build
    # with no further changes.
    env:
      HAS_SIGNING: ${{ secrets.APPLE_CERTIFICATE_1 != '' && secrets.APPLE_ID != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_APP_PASSWORD != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Report signing mode
        run: |
          if [ "$HAS_SIGNING" = "true" ]; then
            echo "::notice::Apple signing secrets present — building a NOTARIZED release."
          else
            echo "::notice::No Apple signing secrets — building an AD-HOC (unsigned) release."
          fi

      # ---------------------------------------------------------------------
      # Signed path (runs only when the Apple Developer secrets are present)
      # ---------------------------------------------------------------------
      - name: Import Developer ID certificate
        if: env.HAS_SIGNING == 'true'
        env:
          CERTIFICATE_PART1: ${{ secrets.APPLE_CERTIFICATE_1 }}
          CERTIFICATE_PART2: ${{ secrets.APPLE_CERTIFICATE_2 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "${CERTIFICATE_PART1}${CERTIFICATE_PART2}" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Archive (Developer ID)
        if: env.HAS_SIGNING == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild \
            -scheme ClaudeGlance \
            -configuration Release \
            -archivePath build/ClaudeGlance.xcarchive \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            GIT_COMMIT="$(git rev-parse --short HEAD)" \
            archive

      - name: Export (Developer ID signed)
        if: env.HAS_SIGNING == 'true'
        run: |
          xcodebuild -exportArchive \
            -archivePath build/ClaudeGlance.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Notarize
        if: env.HAS_SIGNING == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          ditto -c -k --keepParent build/export/ClaudeGlance.app ClaudeGlance.zip
          xcrun notarytool submit ClaudeGlance.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

      - name: Staple
        if: env.HAS_SIGNING == 'true'
        run: |
          xcrun stapler staple build/export/ClaudeGlance.app
          ditto -c -k --keepParent build/export/ClaudeGlance.app ClaudeGlance.zip

      # ---------------------------------------------------------------------
      # Unsigned path (runs only when the Apple Developer secrets are absent)
      # Produces the same build/export/ClaudeGlance.app the signed path does,
      # ad-hoc signed (the Release config's CODE_SIGN_IDENTITY is "-").
      # ---------------------------------------------------------------------
      - name: Archive (ad-hoc)
        if: env.HAS_SIGNING != 'true'
        run: |
          xcodebuild \
            -scheme ClaudeGlance \
            -configuration Release \
            -archivePath build/ClaudeGlance.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            GIT_COMMIT="$(git rev-parse --short HEAD)" \
            archive
          mkdir -p build/export
          cp -R build/ClaudeGlance.xcarchive/Products/Applications/ClaudeGlance.app build/export/

      # ---------------------------------------------------------------------
      # Common path (both modes)
      # ---------------------------------------------------------------------
      - name: Build DMG
        run: |
          VOL_NAME="ClaudeGlance" scripts/make-dmg.sh \
            build/export/ClaudeGlance.app \
            ClaudeGlance.dmg

      - name: Compose release notes
        run: |
          if [ "$HAS_SIGNING" = "true" ]; then
            echo "RELEASE_BODY=Signed with a Developer ID and notarized by Apple — just open it after installing." >> "$GITHUB_ENV"
          else
            {
              echo "RELEASE_BODY<<EOF"
              echo "This build is ad-hoc signed (not yet notarized). On first launch macOS may say it cannot verify the developer:"
              echo ""
              echo "- Right-click ClaudeGlance in /Applications and choose **Open** (once), or"
              echo "- run: \`xattr -dr com.apple.quarantine /Applications/ClaudeGlance.app\`"
              echo "EOF"
            } >> "$GITHUB_ENV"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # The .zip only exists on the signed (notarized) path; softprops skips
          # unmatched files by default, so listing it here is safe in both modes.
          files: |
            ClaudeGlance.dmg
            ClaudeGlance.zip
          body: ${{ env.RELEASE_BODY }}
          generate_release_notes: true

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION=${TAG#v}
          SHA=$(shasum -a 256 ClaudeGlance.dmg | awk '{print $1}')

          # Unsigned builds are quarantined by Gatekeeper, so the cask carries a
          # caveat telling users how to clear it. Once the build is notarized this
          # block is empty and the caveat disappears automatically.
          if [ "$HAS_SIGNING" = "true" ]; then
            CAVEATS=""
          else
            CAVEATS="
            caveats <<~EOS
              ClaudeGlance is ad-hoc signed (not notarized). On first launch macOS
              may block it. Right-click the app in /Applications and choose Open,
              or run:
                xattr -dr com.apple.quarantine /Applications/ClaudeGlance.app
            EOS
          "
          fi

          FORMULA="cask \"claudeglance\" do
            version \"$VERSION\"
            sha256 \"$SHA\"

            url \"https://github.com/broots144/claudeglance/releases/download/v#{version}/ClaudeGlance.dmg\"
            name \"ClaudeGlance\"
            desc \"macOS menu bar app showing Claude.ai plan usage in real time\"
            homepage \"https://github.com/broots144/claudeglance\"

            app \"ClaudeGlance.app\"
          $CAVEATS
            zap trash: [
              \"~/Library/Preferences/io.github.broots144.ClaudeGlance.plist\",
              \"~/Library/Application Support/ClaudeGlance\",
            ]
          end"

          ENCODED=$(echo "$FORMULA" | base64)

          # Get current file SHA (needed to update an existing cask file)
          CURRENT=$(curl -s \
            -H "Authorization: token $HOMEBREW_TAP_TOKEN" \
            https://api.github.com/repos/broots144/homebrew-tap/contents/Casks/claudeglance.rb)
          FILE_SHA=$(echo "$CURRENT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))")

          curl -s -X PUT \
            -H "Authorization: token $HOMEBREW_TAP_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/broots144/homebrew-tap/contents/Casks/claudeglance.rb \
            -d "{\"message\":\"Update claudeglance to $VERSION\",\"content\":\"$ENCODED\",\"sha\":\"$FILE_SHA\"}"
