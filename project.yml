name: ClaudeGlance
options:
  bundleIdPrefix: io.github.broots144
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
  configs:
    # Pin both architectures explicitly so release builds stay universal
    # (Intel + Apple Silicon) even after a future Xcode drops x86_64 from
    # ARCHS_STANDARD as Intel support is wound down. Debug is left on the
    # default active-arch-only for fast local builds.
    Release:
      ARCHS: "x86_64 arm64"
      ONLY_ACTIVE_ARCH: NO

targets:
  ClaudeGlance:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
      - path: Resources
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.broots144.ClaudeGlance
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        LSUIElement: YES
    dependencies:
      - sdk: Security.framework
    entitlements:
      path: Resources/ClaudeGlance.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true

  ClaudeGlanceTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        type: group
    dependencies:
      - target: ClaudeGlance
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.broots144.ClaudeGlanceTests
        GENERATE_INFOPLIST_FILE: YES
